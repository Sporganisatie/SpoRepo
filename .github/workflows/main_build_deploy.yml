name: Build and deploy applicatie naar Azure

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: dotnet build (produces .playwright driver folder)
        run: dotnet build -c Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ./myapp --no-restore

      - name: Copy Playwright driver into publish folder
        shell: pwsh
        run: |
          $src = "./bin/Release/net8.0/.playwright"
          if (-not (Test-Path $src)) { throw ".playwright driver folder not found at $src after build" }
          Copy-Item -Recurse -Force $src ./myapp/.playwright

      - name: Install Playwright Chromium into publish folder
        shell: pwsh
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/myapp/.playwright-browsers
        run: ./myapp/playwright.ps1 install chromium

      - name: Zip publish folder
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          if (Test-Path ./app.zip) { Remove-Item ./app.zip -Force }
          [System.IO.Compression.ZipFile]::CreateFromDirectory(
            (Resolve-Path ./myapp).Path,
            (Join-Path (Get-Location) 'app.zip'),
            [System.IO.Compression.CompressionLevel]::Optimal,
            $false)
          $size = (Get-Item ./app.zip).Length
          Write-Host "app.zip size: $([math]::Round($size/1MB,1)) MB ($size bytes)"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./app.zip
          include-hidden-files: true

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'SpoReDev'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F4BE917BD05D462C8CD1DBA436752F8E }}
          package: ./app.zip